<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none" role="img" aria-label="iCSee Local Control">
  <defs>
    <linearGradient id="accent" x1="150" y1="110" x2="360" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="238" r="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12324a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </radialGradient>
  </defs>

  <!-- tile: dark, reads on both light and dark README backgrounds -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#glow)"/>
  <rect x="33.5" y="33.5" width="445" height="445" rx="110.5" stroke="url(#accent)" stroke-opacity="0.30" stroke-width="3"/>

  <!-- camera lens, centered at 256,256 -->
  <g transform="translate(256 256)">
    <!-- barrel + glass rings -->
    <circle r="156" stroke="url(#accent)" stroke-width="20"/>
    <circle r="120" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="6"/>

    <!-- aperture iris: hexagon + swirling blades -->
    <g stroke="url(#accent)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0,-92 L79.7,-46 L79.7,46 L0,92 L-79.7,46 L-79.7,-46 Z"/>
      <path d="M0,-92 L-17,-29.4 M79.7,-46 L17,-29.4 M79.7,46 L34,0 M0,92 L17,29.4 M-79.7,46 L-17,29.4 M-79.7,-46 L-34,0"/>
    </g>

    <!-- pupil + specular glint -->
    <circle r="30" fill="#0b1220" stroke="url(#accent)" stroke-width="8"/>
    <circle r="13" fill="url(#accent)"/>
    <circle cx="-9" cy="-9" r="6.5" fill="#eafffb" fill-opacity="0.9"/>

    <!-- top-left glass glint on the barrel -->
    <path d="M-110,-110 A156 156 0 0 1 -35,-152" stroke="#a7f3e8" stroke-opacity="0.85" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>
</svg>

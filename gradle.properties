org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
org.gradle.parallel=true
org.gradle.caching=true

# ARM64 proot/Termux environment: the Maven-distributed aapt2 "linux" artifact
# published by Google for AGP is x86_64-only, and Termux's native aarch64
# aapt2 build is too old to parse the android-36 android.jar resource table.
# We run the official x86_64 aapt2 (matching this AGP version) under QEMU
# user-mode emulation instead. See BUILDING_IN_PROOT.md for the full rationale.
android.aapt2FromMavenOverride=/root/icsee-local-camera/toolchain/aapt2-bin/aapt2

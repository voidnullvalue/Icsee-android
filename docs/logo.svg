<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none" role="img" aria-label="iCSee Local Control">
  <defs>
    <linearGradient id="accent" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- tile: dark so the mark reads on both light and dark README backgrounds -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="#0b1220"/>
  <rect x="33.5" y="33.5" width="445" height="445" rx="102.5" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="3"/>

  <g stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <g transform="rotate(-12 256 262)">
      <!-- wall mount -->
      <path d="M148 206 v112"/>
      <path d="M148 262 h46"/>
      <!-- camera body -->
      <rect x="190" y="224" width="150" height="76" rx="38"/>
      <!-- sunshade lip -->
      <path d="M302 212 h30 a22 22 0 0 1 22 22 v56 a22 22 0 0 1 -22 22 h-30"/>
      <!-- lens -->
      <circle cx="328" cy="262" r="26" fill="#0b1220"/>
      <circle cx="328" cy="262" r="9" fill="url(#accent)" stroke="none"/>
      <!-- signal waves radiating from the lens -->
      <path d="M372 230 a44 44 0 0 1 0 64" stroke-opacity="0.95"/>
      <path d="M400 210 a76 76 0 0 1 0 104" stroke-opacity="0.65"/>
    </g>
  </g>
</svg>
